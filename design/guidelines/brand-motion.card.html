<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--studio-bg); padding: 20px; }
  .frame { position: relative; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); aspect-ratio: 16/7; }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .wash { position: absolute; inset: 0; background: linear-gradient(120deg, rgba(11,46,89,0.55), rgba(9,11,21,0.15) 60%); }
  .cap { position: absolute; left: 16px; bottom: 12px; color: #fff; }
  .kicker { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.85; }
  .t { font-weight: 300; font-size: 1.5rem; letter-spacing: -0.02em; margin-top: 2px; }
</style>
</head>
<body>
  <div class="frame">
    <video src="../assets/hero.mp4" autoplay loop muted playsinline poster="../assets/hero-poster.png"></video>
    <div class="wash"></div>
    <div class="cap"><div class="kicker">Founder-led federal IT</div><div class="t">Engineered to spec.</div></div>
  </div>
</body>
</html>
