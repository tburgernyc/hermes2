<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="8 → 14 → 22 → pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--studio-bg); font-family: var(--font-mono); padding: 22px 28px; }
  .row { display: flex; gap: 18px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 74px; height: 60px; background: var(--glass-bg-strong); border: 1px solid var(--studio-line); box-shadow: var(--glass-shadow); }
  .lbl { font-size: 0.64rem; color: var(--studio-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">radius · 8</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="lbl">lg · 14</div></div>
    <div class="item"><div class="box" style="border-radius:22px"></div><div class="lbl">xl · 22</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill · 999</div></div>
  </div>
</body>
</html>
