<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: #e9edf3; font-family: var(--font-sans); padding: 20px; display: flex; gap: 16px; }
  .pane { flex: 1; border-radius: var(--radius-lg); padding: 18px; border: 1px solid var(--studio-line); background: var(--studio-bg); color: var(--studio-ink); }
  .lbl { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--studio-muted); margin-bottom: 12px; }
  .stack { display: grid; gap: 12px; }
  .btnRow { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  /* a stand-in neumorphic icon/toggle button using the control-neu tokens */
  .neuBtn { width: 38px; height: 38px; border-radius: var(--radius-pill); border: none; cursor: pointer;
    background: var(--neu-bg-control); box-shadow: var(--neu-shadow-sm-control); color: var(--studio-muted);
    display: inline-flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 0.8rem; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js?v=20260620b"></script>
</head>
<body>
<div class="pane" id="studio"></div>
<div class="pane" id="command" data-theme="command"></div>
<script type="text/babel">
  const { Field, Select, Button } = window.BurgerGovDesignSystem_d0c3b4;
  function Controls({ label }) {
    return (
      <>
        <div className="lbl">{label}</div>
        <div className="stack">
          <Field label="Email" name="email" type="email" defaultValue="t.burger@burgergov.com" />
          <Select label="Cost type" name="cost" defaultValue="labor">
            <option value="labor">Labor</option>
            <option value="materials">Materials</option>
          </Select>
          <div className="btnRow">
            <Button variant="primary">Approve</Button>
            <Button variant="secondary">View statement</Button>
            <button className="neuBtn" aria-label="settings">⚙</button>
          </div>
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("studio")).render(<Controls label="Studio · light" />);
  ReactDOM.createRoot(document.getElementById("command")).render(<Controls label="Command · dark" />);
</script>
</body>
</html>
