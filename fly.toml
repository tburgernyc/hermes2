# =============================================================================
# Hermes 2.0 — Fly.io app config (Fly Machines, deployed from the Dockerfile).
#
# Schema verified against the current Fly docs (June 2026):
#   - https://fly.io/docs/reference/configuration/
#   - https://fly.io/docs/launch/autostop-autostart/
#
# Notes that matter for THIS app:
#   * auto_stop_machines takes a STRING now ("off" | "stop" | "suspend"),
#     not a bool. ("stop" == legacy true, "off" == legacy false.)
#   * min_machines_running lives INSIDE [http_service] and only takes effect
#     when auto_stop_machines is "stop" or "suspend". We keep it at 1 so Fly
#     always leaves one Machine warm in the primary region — the Inngest cron
#     scheduler must never be fully scaled to zero (CLAUDE.md §7, PROJECT_PLAN
#     §6). With min_machines_running = 1, the proxy will autostop *excess*
#     Machines but will not stop below this floor.
#   * The container binds 0.0.0.0:3000 (Dockerfile sets HOSTNAME/PORT); the Fly
#     proxy terminates TLS and forwards to internal_port = 3000.
# =============================================================================

app = "hermes2"
primary_region = "iad"   # US East (Ashburn, VA) — close to Neon US East + low US latency.

[build]
  dockerfile = "Dockerfile"

# Run DB migrations as the OWNER role in a one-off Machine BEFORE any new Machine takes traffic.
# A non-zero exit ABORTS the deploy (Fly does not roll the new release out), so a failed or
# partial migration never reaches production. The migrator is a compiled, self-contained bundle
# baked into the image (Dockerfile `migrator` stage); it reads MIGRATION_DATABASE_URL (the Neon
# OWNER role) from Fly secrets — prod DB creds therefore never touch CI (CLAUDE.md §4/§7). The
# migrations are idempotent, so a re-run (e.g. a retried deploy) is safe. release_command replaces
# CMD but NOT ENTRYPOINT; default timeout is 5 min (raise via `release_command_timeout` if needed).
[deploy]
  release_command = "node /app/migrator/dist/migrate.js"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  # Liveness health check — the Fly proxy routes traffic to a Machine only once GET /api/health
  # passes, and flags/restarts a Machine that starts failing it. /api/health is dependency-free
  # (it does NOT touch the DB), so a transient DB blip can't flap the Machine: liveness ≠ readiness.
  # `method`/`protocol` are lowercase per the Fly schema; the proxy speaks http to internal_port.
  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "get"
    timeout = "5s"
    path = "/api/health"

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
