<!-- @dsCard group="Type" viewport="700x190" name="Mono Caps" subtitle="Tracked uppercase for labels, nav & data" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--studio-bg); font-family: var(--font-sans); color: var(--studio-ink); padding: 24px 28px; }
  .kicker { font-family: var(--font-mono); font-size: 0.74rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--studio-primary); }
  .nav { display: flex; gap: 28px; margin: 16px 0; }
  .navlink { font-family: var(--font-mono); font-size: 0.76rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--studio-muted); }
  .num { font-family: var(--font-mono); font-size: 1.4rem; font-weight: 300; letter-spacing: -0.01em; }
  .meta { font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--studio-muted); margin-top: 14px; }
</style>
</head>
<body>
  <div class="kicker">Founder-led federal IT</div>
  <div class="nav"><span class="navlink">Capabilities</span><span class="navlink">About</span><span class="navlink">Contact</span></div>
  <div class="num">$248,500.00&nbsp;&nbsp;·&nbsp;&nbsp;NAICS 541511</div>
  <div class="meta">JetBrains Mono · kicker 0.18em · nav 0.12em · tabular data</div>
</body>
</html>
