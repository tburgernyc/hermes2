<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BurgerGov — Subcontractor networks at algorithmic speed</title>
<link rel="stylesheet" href="../../styles.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&display=swap" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" />
<link rel="stylesheet" href="marketing.css" />
<style> body { margin: 0; background: #09090b; } </style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="marketing-chrome.jsx"></script>
<script type="text/babel" src="marketing-views.jsx"></script>
<script type="text/babel">
  const { useState, useEffect } = React;
  const { Header, Footer, AmbientCanvas } = window.MarketingChrome;
  const { HomeView, CapabilitiesView, AboutView, ContactView } = window.MarketingViews;

  function App() {
    const [route, setRoute] = useState("home");
    const [sent, setSent] = useState(false);
    const [theme, setTheme] = useState("command");
    const [go_, setGo] = useState(false);

    useEffect(() => { const t = setTimeout(() => setGo(true), 60); return () => clearTimeout(t); }, []);

    useEffect(() => {
      const saved = localStorage.getItem("bg-theme");
      if (saved) setTheme(saved);
    }, []);
    useEffect(() => {
      document.documentElement.setAttribute("data-theme", theme === "command" ? "command" : "");
      document.body.style.background = "var(--studio-bg)";
      localStorage.setItem("bg-theme", theme);
    }, [theme]);

    function go(r) {
      if (r === "contact") setSent(false);
      setRoute(r);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    const toggleTheme = () => setTheme((t) => (t === "command" ? "studio" : "command"));

    return (
      <div className={"shell" + (go_ ? " go" : "")}>
        <div className="bgMesh" aria-hidden="true" />
        <div className="bgGrid" aria-hidden="true" />
        <AmbientCanvas theme={theme} />
        <Header route={route === "home" ? "" : route} go={go} theme={theme} toggleTheme={toggleTheme} />
        {route === "home" && <HomeView go={go} theme={theme} />}
        {route === "capabilities" && <CapabilitiesView />}
        {route === "about" && <AboutView />}
        {route === "contact" && <ContactView sent={sent} onSend={() => setSent(true)} />}
        <Footer go={go} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
