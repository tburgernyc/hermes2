<!-- @dsCard group="Colors" viewport="700x150" name="Semantic Tones" subtitle="Info · Success · Warn · Danger state surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--studio-bg); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .tone { flex: 1 1 140px; border-radius: var(--radius); padding: 12px 14px; border: 1px solid; }
  .badge { display: inline-flex; align-items: center; gap: 0.3em; font-family: var(--font-mono); font-size: 0.66rem; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: var(--radius-pill); border: 1px solid; }
  .lbl { font-size: 0.78rem; margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="tone" style="background:var(--tone-info-surface);border-color:var(--tone-info-border)">
      <span class="badge" style="background:#fff;border-color:var(--tone-info-border);color:var(--tone-info-ink)">Info</span>
      <div class="lbl" style="color:var(--tone-info-ink)">In progress</div>
    </div>
    <div class="tone" style="background:var(--tone-success-surface);border-color:var(--tone-success-border)">
      <span class="badge" style="background:#fff;border-color:var(--tone-success-border);color:var(--tone-success-ink)">Success</span>
      <div class="lbl" style="color:var(--tone-success-ink)">Approved</div>
    </div>
    <div class="tone" style="background:var(--tone-warn-surface);border-color:var(--tone-warn-border)">
      <span class="badge" style="background:#fff;border-color:var(--tone-warn-border);color:var(--tone-warn-ink)">Warn</span>
      <div class="lbl" style="color:var(--tone-warn-ink)">Pending</div>
    </div>
    <div class="tone" style="background:var(--tone-danger-surface);border-color:var(--tone-danger-border)">
      <span class="badge" style="background:#fff;border-color:var(--tone-danger-border);color:var(--tone-danger-ink)">Danger</span>
      <div class="lbl" style="color:var(--tone-danger-ink)">Rejected</div>
    </div>
  </div>
</body>
</html>
